<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMenyu Admin | Security Logs</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/global.css">
  
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .header h1 {
      font-size: 20px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .badge {
      font-size: 12px;
      padding: 4px 8px;
      background: #ef4444;
      color: white;
      border-radius: 4px;
      font-weight: bold;
    }
    .content {
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .logs-table-container {
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th {
      background: #0f172a;
      padding: 16px;
      font-size: 13px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #334155;
    }
    td {
      padding: 16px;
      font-size: 14px;
      border-bottom: 1px solid #334155;
      color: #e2e8f0;
    }
    tr:hover td {
      background: #334155;
    }
    
    .event-type {
      font-family: monospace;
      padding: 4px 8px;
      border-radius: 4px;
      background: #334155;
      font-size: 13px;
    }
    .event-type.success { color: #4ade80; border: 1px solid #166534; background: rgba(22, 101, 52, 0.2); }
    .event-type.failed { color: #f87171; border: 1px solid #991b1b; background: rgba(153, 27, 27, 0.2); }
    
    .details {
      font-family: monospace;
      font-size: 12px;
      color: #94a3b8;
    }
    
    .back-btn {
      color: #94a3b8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: white; }
    
    .empty-state {
      padding: 48px;
      text-align: center;
      color: #94a3b8;
    }
    
    .refresh-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #2563eb; }

    /* Powered by Branding */
    .powered-by {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 10px;
      color: #64748b;
      opacity: 0.8;
      font-weight: 500;
      pointer-events: none;
      z-index: 1000;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>
      <a href="analytics.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      Security Logs <span class="badge">SECURE</span>
    </h1>
    <button class="refresh-btn" onclick="loadLogs()">Refresh Logs</button>
  </div>

  <div class="content">
    <div class="logs-table-container">
      <table id="logsTable">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Event Protocol</th>
            <th>IP Address</th>
            <th>User Agent</th>
            <th>Operation Details</th>
          </tr>
        </thead>
        <tbody id="logsBody">
          <tr><td colspan="5" class="empty-state">Loading logs...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const config = { apiBaseUrl: '' }; // Uses relative paths through Next.js rewrites
    
    function escapeHtml(unsafe) {
        if (!unsafe || typeof unsafe !== 'string') return unsafe;
        return unsafe
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    }
    
    async function loadLogs() {
      const tbody = document.getElementById('logsBody');
      
      // Get admin credentials from sessionStorage (like the main dashboard does)
      const token = sessionStorage.getItem('smartmenyu_token');
      const cachedUser = sessionStorage.getItem('smartmenyu_admin_user');
      if (!token || !cachedUser) {
        window.location.href = 'analytics.html'; // Redirect to login
        return;
      }
      
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Loading logs...</td></tr>';
      
      try {
        const url = `${config.apiBaseUrl}/api/admin/security-logs`;
        const fetchOptions = { 
            headers: { 'Authorization': `Bearer ${token}` },
            credentials: 'include'
        };
        
        const response = await fetch(url, fetchOptions);
        if (response.status === 401 || response.status === 403) {
            sessionStorage.removeItem('smartmenyu_token');
            window.location.href = 'analytics.html';
            return;
        }
        
        const data = await response.json();
        
        if (!data.logs || data.logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No security events recorded yet.</td></tr>';
            return;
        }
        
        tbody.innerHTML = data.logs.map(log => {
            // Format time nicely
            const d = new Date(log.timestamp);
            const timeStr = d.toLocaleString('en-IN', { 
                day: '2-digit', month: 'short', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
            
            // Format styling based on event success/failure
            const isSuccess = log.event.includes('SUCCESS') || log.event.includes('CHANGED');
            const isFail = log.event.includes('FAILED');
            let typeClass = '';
            if (isSuccess) typeClass = 'success';
            if (isFail) typeClass = 'failed';
            
            // Format details cleanly
            const cleanDetails = { ...log };
            delete cleanDetails.timestamp;
            delete cleanDetails.event;
            delete cleanDetails.ip;
            delete cleanDetails.userAgent;
            
            const eventVal = escapeHtml(log.event);
            const ipVal = escapeHtml(log.ip);
            const uaVal = escapeHtml(log.userAgent);
            const detailsVal = escapeHtml(JSON.stringify(cleanDetails).replace(/[{}]/g, '').replace(/"/g, ''));
            
            return `
                <tr>
                    <td style="white-space: nowrap">${timeStr}</td>
                    <td><span class="event-type ${typeClass}">${eventVal}</span></td>
                    <td style="font-family: monospace;">${ipVal}</td>
                    <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${uaVal}">${uaVal}</td>
                    <td class="details">${detailsVal}</td>
                </tr>
            `;
        }).join('');
        
      } catch (err) {
        console.error('Failed to load logs', err);
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state" style="color: #ef4444;">Error loading logs from server.</td></tr>';
      }
    }
    
    // Initial load
    document.addEventListener('DOMContentLoaded', loadLogs);
  </script>

</body>
</html>
