<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paradise Restaurant - A Legend Since 1953 - Takeaway Menu">
    <title>Paradise - A Legend Since 1953</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- View Mode Switcher -->
    <nav class="view-switcher" id="viewSwitcher">
        <div class="switcher-container">
            <span class="switcher-label">View Mode:</span>
            <div class="switcher-buttons">
                <button class="switcher-btn" id="mobileBtn" data-mode="mobile">
                    <svg class="switcher-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        <line x1="12" y1="18" x2="12" y2="18"></line>
                    </svg>
                    Mobile
                </button>
                <button class="switcher-btn active" id="desktopBtn" data-mode="desktop">
                    <svg class="switcher-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    Desktop
                </button>
            </div>
        </div>
    </nav>

    <header class="welcome-header">
        <img src="assets/images/welcome-banner.png" alt="Paradise Restaurant - A Legend Since 1953"
            class="welcome-banner">
    </header>

    <main class="main-content">
        <!-- Diet Type Selector (Veg / Non Veg) -->
        <section class="category-section diet-type-section">
            <div class="diet-type-buttons" id="dietTypeButtons">
                <button class="diet-btn" data-diet="veg">
                    <span class="diet-indicator veg-indicator"></span>
                    Veg
                </button>
                <button class="diet-btn" data-diet="non-veg">
                    <span class="diet-indicator non-veg-indicator"></span>
                    Non Veg
                </button>
            </div>
        </section>

        <!-- Food Category Dropdown -->
        <section class="category-section food-category-section">
            <div class="category-dropdown">
                <button class="dropdown-btn dropdown-btn-small" id="foodCategoryBtn">
                    <span class="dropdown-text">All Categories</span>
                    <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <ul class="dropdown-list" id="foodCategoryList">
                    <li class="dropdown-item selected" data-category="all">All Categories</li>
                    <li class="dropdown-item" data-category="biryanis">Biryanis</li>
                    <li class="dropdown-item" data-category="starters">Starters</li>
                    <li class="dropdown-item" data-category="kebabs">Kebabs</li>
                    <li class="dropdown-item" data-category="curries">Curries</li>
                    <li class="dropdown-item" data-category="indian-breads">Indian Breads</li>
                    <li class="dropdown-item" data-category="desserts">Desserts</li>
                    <li class="dropdown-item" data-category="beverages">Beverages</li>
                </ul>
            </div>
        </section>

        <!-- Menu Container (dynamically populated by app.js) -->
        <div id="menuContainer"></div>
    </main>

    <!-- Item Detail Modal -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <h2 class="modal-title" id="modalTitle">Item Name</h2>
            <p class="modal-description" id="modalDescription">Item description.</p>

            <!-- Tab Navigation -->
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="images">Img</button>
                <button class="modal-tab" data-tab="videos">Vids</button>
                <button class="modal-tab" data-tab="ingredients">Ingr</button>
                <button class="modal-tab" data-tab="nutrients">Nutr</button>
            </div>

            <!-- Tab Content -->
            <div class="tab-content">
                <!-- Images Tab -->
                <div class="tab-panel active" id="imagesPanel">
                    <div class="carousel">
                        <button class="carousel-arrow carousel-prev" data-carousel="images">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <div class="carousel-content">
                            <div class="carousel-item active" data-index="0">
                                <img src="" alt="Image 1" class="carousel-image" id="itemImage1">
                            </div>
                            <div class="carousel-item" data-index="1">
                                <img src="" alt="Image 2" class="carousel-image" id="itemImage2">
                            </div>
                            <div class="carousel-item" data-index="2">
                                <img src="" alt="Image 3" class="carousel-image" id="itemImage3">
                            </div>
                        </div>
                        <button class="carousel-arrow carousel-next" data-carousel="images">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Videos Tab -->
                <div class="tab-panel" id="videosPanel">
                    <div class="carousel">
                        <button class="carousel-arrow carousel-prev" data-carousel="videos">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <div class="carousel-content">
                            <div class="carousel-item active" data-index="0">
                                <video class="carousel-image" id="itemVideo1" loop playsinline></video>
                            </div>
                            <div class="carousel-item" data-index="1">
                                <video class="carousel-image" id="itemVideo2" loop playsinline></video>
                            </div>
                            <div class="carousel-item" data-index="2">
                                <video class="carousel-image" id="itemVideo3" loop playsinline></video>
                            </div>
                        </div>
                        <button class="carousel-arrow carousel-next" data-carousel="videos">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>


                <!-- Ingredients Tab -->
                <div class="tab-panel" id="ingredientsPanel">
                    <div class="scrollable-list">
                        <ul class="info-list" id="ingredientsList">
                            <li class="info-item">Ingredients coming soon</li>
                        </ul>
                    </div>
                </div>

                <!-- Nutrients Tab -->
                <div class="tab-panel" id="nutrientsPanel">
                    <div class="scrollable-list">
                        <ul class="info-list" id="nutrientsList">
                            <li class="info-item">Nutritional info coming soon</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>

</html>
